<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Weather Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:450px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:32px;
    }

    .search-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:16px;
      outline:none;
    }

    button{
      padding:14px 20px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#0ea5e9;
      transform:scale(1.05);
    }

    .weather-card{
      text-align:center;
      display:none;
      animation:fade 0.5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .weather-card img{
      width:120px;
    }

    .temp{
      font-size:55px;
      margin:10px 0;
      font-weight:bold;
    }

    .city{
      font-size:28px;
      margin-bottom:10px;
    }

    .details{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-top:20px;
    }

    .box{
      background:rgba(255,255,255,0.1);
      padding:15px;
      border-radius:15px;
    }

    .error{
      text-align:center;
      color:#f87171;
      margin-top:10px;
      display:none;
    }

    .loading{
      text-align:center;
      display:none;
      margin-top:15px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>🌦 Weather App</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button onclick="getWeather()">Search</button>
    </div>

    <div class="loading" id="loading">
      Loading weather...
    </div>

    <div class="error" id="error">
      City not found!
    </div>

    <div class="weather-card" id="weatherCard">

      <div class="city" id="city"></div>

      <img id="icon" src="" alt="Weather Icon">

      <div class="temp" id="temp"></div>

      <h2 id="condition"></h2>

      <div class="details">

        <div class="box">
          <h3>💧 Humidity</h3>
          <p id="humidity"></p>
        </div>

        <div class="box">
          <h3>🌬 Wind</h3>
          <p id="wind"></p>
        </div>

        <div class="box">
          <h3>🌡 Feels Like</h3>
          <p id="feels"></p>
        </div>

        <div class="box">
          <h3>📍 Country</h3>
          <p id="country"></p>
        </div>

      </div>
    </div>

  </div>

  <script>

    // PUBLIC API
    const apiKey = "00078d5a21d6185c9786c0beeab0a5b7";

    async function getWeather(){

      const city = document.getElementById("cityInput").value;

      const weatherCard = document.getElementById("weatherCard");
      const error = document.getElementById("error");
      const loading = document.getElementById("loading");

      if(city === ""){
        alert("Please enter city name");
        return;
      }

      weatherCard.style.display = "none";
      error.style.display = "none";
      loading.style.display = "block";

      try{

        const response = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );

        const data = await response.json();

        loading.style.display = "none";

        if(data.cod != 200){
          error.style.display = "block";
          return;
        }

        document.getElementById("city").innerText = data.name;
        document.getElementById("temp").innerText = `${Math.round(data.main.temp)}°C`;
        document.getElementById("condition").innerText = data.weather[0].main;
        document.getElementById("humidity").innerText = `${data.main.humidity}%`;
        document.getElementById("wind").innerText = `${data.wind.speed} km/h`;
        document.getElementById("feels").innerText = `${Math.round(data.main.feels_like)}°C`;
        document.getElementById("country").innerText = data.sys.country;

        const iconCode = data.weather[0].icon;

        document.getElementById("icon").src =
          `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

        weatherCard.style.display = "block";

      }catch(err){

        loading.style.display = "none";
        error.style.display = "block";

      }
    }

    // ENTER KEY SUPPORT
    document
      .getElementById("cityInput")
      .addEventListener("keypress", function(event){

        if(event.key === "Enter"){
          getWeather();
        }

      });

  </script>

</body>
</html>
