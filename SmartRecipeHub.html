<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Recipe Hub</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#111827,#1f2937,#374151);
      min-height:100vh;
      color:white;
      padding:30px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:45px;
    }

    .search-box{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:40px;
    }

    input{
      width:350px;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      font-size:16px;
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:12px;
      background:#f59e0b;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#d97706;
      transform:scale(1.05);
    }

    .recipes{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border-radius:18px;
      overflow:hidden;
      transition:0.4s;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      backdrop-filter:blur(8px);
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .content{
      padding:20px;
    }

    .content h2{
      font-size:22px;
      margin-bottom:15px;
    }

    .content a{
      text-decoration:none;
      background:#10b981;
      padding:12px 18px;
      border-radius:10px;
      color:white;
      display:inline-block;
      transition:0.3s;
    }

    .content a:hover{
      background:#059669;
    }

    .loading{
      text-align:center;
      font-size:20px;
      display:none;
      margin-top:20px;
    }

    .error{
      text-align:center;
      color:#f87171;
      display:none;
      margin-top:20px;
      font-size:18px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🍔 Smart Recipe Hub</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search food recipe...">
      <button onclick="searchRecipes()">Search</button>
    </div>

    <div class="loading" id="loading">
      Loading recipes...
    </div>

    <div class="error" id="error">
      No recipes found!
    </div>

    <div class="recipes" id="recipes"></div>

  </div>

  <script>

    const recipesContainer = document.getElementById("recipes");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");

    async function searchRecipes(){

      const query = document.getElementById("searchInput").value;

      if(query === ""){
        alert("Please enter recipe name");
        return;
      }

      recipesContainer.innerHTML = "";
      loading.style.display = "block";
      error.style.display = "none";

      try{

        // FREE PUBLIC API
        const response = await fetch(
          `https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`
        );

        const data = await response.json();

        loading.style.display = "none";

        if(data.meals === null){
          error.style.display = "block";
          return;
        }

        data.meals.forEach(meal => {

          const card = document.createElement("div");
          card.classList.add("card");

          card.innerHTML = `
          
            <img src="${meal.strMealThumb}" alt="Recipe Image">

            <div class="content">

              <h2>${meal.strMeal}</h2>

              <p style="margin-bottom:15px;">
                🍽 ${meal.strCategory}
              </p>

              <a href="${meal.strYoutube}" target="_blank">
                Watch Recipe
              </a>

            </div>
          
          `;

          recipesContainer.appendChild(card);

        });

      }catch(err){

        loading.style.display = "none";
        error.style.display = "block";

      }

    }

    // ENTER KEY SUPPORT
    document
      .getElementById("searchInput")
      .addEventListener("keypress", function(event){

        if(event.key === "Enter"){
          searchRecipes();
        }

      });

  </script>

</body>
</html>
