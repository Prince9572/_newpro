<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Random User App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    overflow:hidden;
}

.container{
    width:360px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

h1{
    margin-bottom:10px;
    font-size:30px;
}

.subtitle{
    color:#ddd;
    margin-bottom:25px;
}

.card{
    background:white;
    color:black;
    border-radius:20px;
    padding:20px;
    transition:0.4s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #243b55;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:10px;
}

.info{
    margin:8px 0;
    color:#333;
    font-size:15px;
}

button{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,114,255,0.4);
}

.loader{
    display:none;
    margin-top:15px;
    color:#fff;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌍 User Generator</h1>
    <p class="subtitle">Interactive Website Using Public API</p>

    <div class="card">
        <img id="userImage" src="" alt="User Image">

        <h2 id="userName">Loading...</h2>

        <p class="info" id="userEmail"></p>
        <p class="info" id="userPhone"></p>
        <p class="info" id="userLocation"></p>
    </div>

    <button onclick="fetchUser()">Generate User</button>

    <div class="loader" id="loader">Loading User...</div>
</div>

<script>
const userImage = document.getElementById("userImage");
const userName = document.getElementById("userName");
const userEmail = document.getElementById("userEmail");
const userPhone = document.getElementById("userPhone");
const userLocation = document.getElementById("userLocation");
const loader = document.getElementById("loader");

async function fetchUser(){

    loader.style.display = "block";

    try{

        const response = await fetch("https://randomuser.me/api/");
        const data = await response.json();

        const user = data.results[0];

        userImage.src = user.picture.large;

        userName.innerText =
            user.name.first + " " + user.name.last;

        userEmail.innerText =
            "📧 " + user.email;

        userPhone.innerText =
            "📞 " + user.phone;

        userLocation.innerText =
            "📍 " +
            user.location.city +
            ", " +
            user.location.country;

    }

    catch(error){

        userName.innerText = "Failed to Load User";

        console.log(error);
    }

    loader.style.display = "none";
}

fetchUser();
</script>

</body>
</html>
