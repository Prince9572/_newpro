<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant AI Assistant</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Inter, Arial, sans-serif;
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .chat-container{
      width:100%;
      max-width:850px;
      height:90vh;
      background:#111827;
      border-radius:24px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .chat-header{
      padding:22px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:#0b1220;
    }

    .chat-header h1{
      font-size:24px;
      font-weight:700;
    }

    .chat-header p{
      margin-top:6px;
      color:#94a3b8;
      font-size:14px;
    }

    #chat-box{
      flex:1;
      overflow-y:auto;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:18px;
      scroll-behavior:smooth;
    }

    .message{
      max-width:80%;
      padding:16px 18px;
      border-radius:18px;
      line-height:1.6;
      white-space:pre-wrap;
      word-wrap:break-word;
      font-size:15px;
    }

    .user-message{
      align-self:flex-end;
      background:#2563eb;
      border-bottom-right-radius:4px;
    }

    .bot-message{
      align-self:flex-start;
      background:#1e293b;
      border-bottom-left-radius:4px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .typing{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .typing span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#94a3b8;
      animation:bounce 1s infinite;
    }

    .typing span:nth-child(2){
      animation-delay:0.2s;
    }

    .typing span:nth-child(3){
      animation-delay:0.4s;
    }

    @keyframes bounce{
      0%,80%,100%{
        transform:scale(0);
      }
      40%{
        transform:scale(1);
      }
    }

    .input-area{
      display:flex;
      gap:12px;
      padding:18px;
      border-top:1px solid rgba(255,255,255,0.08);
      background:#0b1220;
    }

    #userInput{
      flex:1;
      background:#1e293b;
      border:none;
      outline:none;
      color:white;
      padding:16px;
      border-radius:14px;
      font-size:15px;
    }

    #userInput::placeholder{
      color:#94a3b8;
    }

    button{
      border:none;
      outline:none;
      background:#2563eb;
      color:white;
      padding:0 24px;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
    }

    .suggestions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .suggestion-btn{
      background:#1e293b;
      border:1px solid rgba(255,255,255,0.08);
      color:#cbd5e1;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      transition:0.2s;
    }

    .suggestion-btn:hover{
      background:#334155;
    }

    @media(max-width:768px){

      .chat-container{
        height:100vh;
        border-radius:0;
      }

      .message{
        max-width:90%;
      }

      button{
        padding:0 18px;
      }
    }

  </style>
</head>

<body>

  <div class="chat-container">

    <div class="chat-header">
      <h1>🍽 Restaurant AI Assistant</h1>
      <p>Ask about menus, cuisines, food recommendations, and meals.</p>

      <div class="suggestions">
        <button class="suggestion-btn" onclick="quickMessage('Show italian dinner menu')">
          Italian Dinner
        </button>

        <button class="suggestion-btn" onclick="quickMessage('Best indian lunch items')">
          Indian Lunch
        </button>

        <button class="suggestion-btn" onclick="quickMessage('Show japanese breakfast menu')">
          Japanese Breakfast
        </button>

        <button class="suggestion-btn" onclick="quickMessage('Recommend mexican dinner')">
          Mexican Dinner
        </button>
      </div>
    </div>

    <div id="chat-box">

      <div class="message bot-message">
👋 Welcome to Restaurant AI Assistant

You can ask things like:

• Show italian dinner menu
• Recommend chinese lunch
• Best american breakfast
• Suggest french cuisine
      </div>

    </div>

    <div class="input-area">

      <input
        type="text"
        id="userInput"
        placeholder="Ask about food or menus..."
      />

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

  <script>

    const chatBox = document.getElementById("chat-box");
    const inputField = document.getElementById("userInput");

    function addMessage(message, type){

      const div = document.createElement("div");

      div.className = `message ${type}`;

      div.textContent = message;

      chatBox.appendChild(div);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping(){

      const div = document.createElement("div");

      div.className = "message bot-message";

      div.id = "typing-indicator";

      div.innerHTML = `
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      chatBox.appendChild(div);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping(){

      const typing = document.getElementById("typing-indicator");

      if(typing){
        typing.remove();
      }
    }

    async function sendMessage(){

      const input = inputField.value.trim();

      if(!input) return;

      addMessage(input, "user-message");

      inputField.value = "";

      showTyping();

      try{

        const response = await fetch("/api/chat", {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            input
          })
        });

        const data = await response.json();

        removeTyping();

        addMessage(data.output, "bot-message");

      }catch(error){

        removeTyping();

        addMessage(
          "Sorry, something went wrong.",
          "bot-message"
        );
      }
    }

    function quickMessage(text){

      inputField.value = text;

      sendMessage();
    }

    inputField.addEventListener("keypress", function(e){

      if(e.key === "Enter"){
        sendMessage();
      }
    });

  </script>

</body>
</html>
